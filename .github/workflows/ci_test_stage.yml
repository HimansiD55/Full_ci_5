
name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Test (only runs if lint passes) ────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint          # ← waits for lint job to succeed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test

  # ── Job 3: Build (only runs if test passes) ───────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test          # ← waits for test job to succeed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (archive app)
        run: |
          mkdir -p dist
          cp -r src package.json dist/
          echo "Build complete. Contents:"
          ls dist/
