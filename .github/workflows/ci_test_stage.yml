name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  
jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint   # 🔗 runs only if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  build:
    runs-on: ubuntu-latest
    needs: test   # 🔗 runs only if test passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        
      - name: Create artifact
        run: |
           SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
           ARTIFACT_NAME="app-${SHORT_SHA}.tar.gz"
           tar -czf $ARTIFACT_NAME node_modules index.js package.json
           echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
           
      - name: Upload artifect
        uses: actions/upload-artifact@v4
        with:
             name: build-artifact
             path: ${{ env.ARTIFACT_NAME }}
          
      - name: Print artifact name
        run: 'echo "✅ Created artifact: $ARTIFACT_NAME"'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy with Atomic Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. SETUP VARIABLES
            APP_ROOT="/home/${{ secrets.SSH_USERNAME }}/app"
            RELEASES_DIR="$APP_ROOT/releases"
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE_PATH="$RELEASES_DIR/$TIMESTAMP"
            CURRENT_SYMLINK="$APP_ROOT/current"

            echo "🚀 Starting Deployment: $TIMESTAMP"
            mkdir -p $RELEASES_DIR

            # 2. SAVE PREVIOUS VERSION PATH (For Rollback)
            # We check where the 'current' symlink points right now
            PREVIOUS_RELEASE=$(readlink -f $CURRENT_SYMLINK || echo "")

            # 3. UNPACK NEW CODE INTO TIMESTAMPED FOLDER
            mkdir -p $NEW_RELEASE_PATH
            # Move the uploaded tar to the app root if it's not there
            tar -xzf $APP_ROOT/*.tar.gz -C $NEW_RELEASE_PATH
            
            echo "📦 Installing dependencies in $NEW_RELEASE_PATH"
            cd $NEW_RELEASE_PATH
            npm install --production

            # 4. ATOMIC SWITCH (Point 'current' to the new version)
            echo "🔗 Switching Symlink..."
            ln -sfn $NEW_RELEASE_PATH $CURRENT_SYMLINK

            # 5. RESTART APP
            # Point PM2 to the symlink path so it always stays consistent
            pm2 restart my-node-app || pm2 start $CURRENT_SYMLINK/index.js --name my-node-app
            
            # 6. HEALTH CHECK (The "Automatic" part)
            echo "⏳ Monitoring stability for 15 seconds..."
            sleep 15

            # Check if app is 'online' and hasn't restarted more than twice
            RESTARTS=$(pm2 jlist | node -e "
              const data = JSON.parse(require('fs').readFileSync(0));
              const app = data.find(a => a.name === 'my-node-app');
              process.stdout.write(app ? app.pm2_env.restart_time.toString() : '999');
            ")

            if [ "$RESTARTS" -lt 2 ]; then
                echo "------------------------------------------------"
                echo "✅ DEPLOYMENT SUCCESSFUL AND STABLE"
                echo "------------------------------------------------"
                # Keep only the last 5 releases to save disk space
                ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf
                rm $APP_ROOT/*.tar.gz
            else
                echo "------------------------------------------------"
                echo "🚨 ALERT: APP IS UNSTABLE! TRIGGERING ROLLBACK..."
                echo "------------------------------------------------"
                
                if [ -n "$PREVIOUS_RELEASE" ] && [ "$PREVIOUS_RELEASE" != "$NEW_RELEASE_PATH" ]; then
                    echo "🔄 Reverting Symlink to: $PREVIOUS_RELEASE"
                    ln -sfn $PREVIOUS_RELEASE $CURRENT_SYMLINK
                    pm2 restart my-node-app
                    echo "✅ ROLLBACK COMPLETE: System reverted to last known stable version."
                else
                    echo "❌ ROLLBACK FAILED: No previous stable release found!"
                fi
                
                # Exit with 1 so GitHub Actions shows a red failure badge
                exit 1
            fi
      
  notify:
      needs: [lint, test, build, deploy]
      if: always()
      runs-on: ubuntu-latest
      steps:
      - name: Send email
        uses:  dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: >
            ${{
              needs.deploy.result == 'success' && '[SUCCESS] Deploy' ||
              needs.deploy.result == 'failure' && '[FAILED] Deploy — Rollback may have triggered' ||
              '[CANCELLED] Deploy'
            }} — ${{ github.repository }}
          body: |
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.actor }}
            Lint   : ${{ needs.lint.result }}
            
            Test   : ${{ needs.test.result }}
            Build  : ${{ needs.build.result }}
            Deploy     : ${{ needs.deploy.result }}
            
            ${{ needs.deploy.result == 'failure' && 'NOTE: App was unstable. Automatic rollback was triggered inside deploy job.' || '' }}
            
            Pipeline   : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
