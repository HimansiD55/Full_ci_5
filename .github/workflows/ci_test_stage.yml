name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  
jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint   # 🔗 runs only if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  build:
    runs-on: ubuntu-latest
    needs: test   # 🔗 runs only if test passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        
      - name: Create artifact
        run: |
           SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
           ARTIFACT_NAME="app-${SHORT_SHA}.tar.gz"
           tar -czf $ARTIFACT_NAME node_modules index.js package.json
           echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
           
      - name: Upload artifect
        uses: actions/upload-artifact@v4
        with:
             name: build-artifact
             path: ${{ env.ARTIFACT_NAME }}
          
      - name: Print artifact name
        run: 'echo "✅ Created artifact: $ARTIFACT_NAME"'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy with Atomic Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. SETUP VARIABLES
            APP_ROOT="/home/${{ secrets.SSH_USERNAME }}/app"
            RELEASES_DIR="$APP_ROOT/releases"
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE_PATH="$RELEASES_DIR/$TIMESTAMP"
            CURRENT_SYMLINK="$APP_ROOT/current"

            echo "🚀 Starting Deployment: $TIMESTAMP"
            mkdir -p $RELEASES_DIR

            # 2. SAVE PREVIOUS VERSION PATH
            # We use 'readlink' but check if it's a real directory
            PREVIOUS_RELEASE=$(readlink -f $CURRENT_SYMLINK)
            if [ "$PREVIOUS_RELEASE" == "$CURRENT_SYMLINK" ] || [ ! -d "$PREVIOUS_RELEASE" ]; then
                PREVIOUS_RELEASE=""
                echo "ℹ️ No valid previous release found. This might be the first deploy."
            fi

            # 3. UNPACK THE LATEST TARBALL ONLY
            mkdir -p $NEW_RELEASE_PATH
            # FIX: We find the most RECENTLY uploaded tar file only
            LATEST_TAR=$(ls -t $APP_ROOT/*.tar.gz | head -1)
            
            if [ -z "$LATEST_TAR" ]; then
                echo "❌ Error: No tarball found in $APP_ROOT"
                exit 1
            fi

            echo "📦 Extracting $LATEST_TAR to $NEW_RELEASE_PATH"
            tar -xzf "$LATEST_TAR" -C "$NEW_RELEASE_PATH"
            
            echo "📦 Installing dependencies..."
            cd $NEW_RELEASE_PATH
            # Using --omit=dev as requested by your npm logs
            npm install --omit=dev --no-audit --no-fund

            # 4. ATOMIC SWITCH
            echo "🔗 Switching Symlink..."
            ln -sfn $NEW_RELEASE_PATH $CURRENT_SYMLINK

            # 5. RESTART APP
            # We use the absolute path to index.js to ensure PM2 finds it
            echo "🚀 Starting/Restarting PM2..."
            pm2 restart my-node-app || pm2 start $CURRENT_SYMLINK/index.js --name my-node-app
            
            # 6. HEALTH CHECK
            echo "⏳ Monitoring stability for 15 seconds..."
            sleep 15

            # Updated parsing logic to be more resilient
            RESTARTS=$(pm2 jlist | node -e "
              try {
                const data = JSON.parse(require('fs').readFileSync(0));
                const app = data.find(a => a.name === 'my-node-app');
                process.stdout.write(app ? app.pm2_env.restart_time.toString() : '999');
              } catch (e) {
                process.stdout.write('999');
              }
            ")

            if [ "$RESTARTS" -lt 2 ]; then
                echo "------------------------------------------------"
                echo "✅ DEPLOYMENT SUCCESSFUL AT $(date)"
                echo "------------------------------------------------"
                # Cleanup: Keep only 5 releases, delete ALL tarballs to prevent the '*' error next time
                ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf
                rm -f $APP_ROOT/*.tar.gz
            else
                echo "------------------------------------------------"
                echo "🚨 ALERT: ROLLBACK TRIGGERED AT $(date)"
                echo "------------------------------------------------"
                
                if [ -n "$PREVIOUS_RELEASE" ]; then
                    echo "🔄 Reverting Symlink to: $PREVIOUS_RELEASE"
                    ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_SYMLINK"
                    pm2 restart my-node-app
                    echo "✅ ROLLBACK COMPLETE: Reverted to previous stable version."
                else
                    echo "❌ ROLLBACK FAILED: No previous stable release to return to!"
                    pm2 stop my-node-app || true
                fi
                exit 1
            fi
      
  notify:
      needs: [lint, test, build, deploy]
      if: always()
      runs-on: ubuntu-latest
      steps:
      - name: Send email
        uses:  dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          subject: >
            ${{
              needs.deploy.result == 'success' && '[SUCCESS] Deploy' ||
              needs.deploy.result == 'failure' && '[FAILED] Deploy — Rollback may have triggered' ||
              '[CANCELLED] Deploy'
            }} — ${{ github.repository }}
          body: |
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.actor }}
            Lint   : ${{ needs.lint.result }}
            
            Test   : ${{ needs.test.result }}
            Build  : ${{ needs.build.result }}
            Deploy     : ${{ needs.deploy.result }}
            
            ${{ needs.deploy.result == 'failure' && 'NOTE: App was unstable. Automatic rollback was triggered inside deploy job.' || '' }}
            
            Pipeline   : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
