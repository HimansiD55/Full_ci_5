name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:

  # ------------------ LINT ------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint


  # ------------------ MATRIX TEST ------------------
  matrix-test:
    name: Run Tests (Matrix)
    needs: lint
    uses: ./.github/workflows/test-matrix.yml


  # ------------------ TEST ------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm test


  # ------------------ BUILD ------------------
  build:
    runs-on: ubuntu-latest
    needs: [test, matrix-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Create artifact
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          ARTIFACT_NAME="app-${SHORT_SHA}.tar.gz"
          mkdir -p build
          cp -r index.js package.json package-lock.json build/

          cd build
          tar -czf ../$ARTIFACT_NAME .
          cd ..
          
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.ARTIFACT_NAME }}

      - run: 'echo "✅ Created artifact: $ARTIFACT_NAME"'


  # ------------------ DEPLOY STAGING ------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: staging   # ✅ auto deploy

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Copy artifact to STAGING server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.tar.gz"
          target: "/home/${{ secrets.SSH_USERNAME }}/app-staging/"

      - name: Deploy to STAGING
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Deploying to STAGING..."

            APP_ROOT="/home/${{ secrets.SSH_USERNAME }}/app-staging"

            mkdir -p "$APP_ROOT"

            # Find latest artifact
            LATEST_TAR=$(ls -t $APP_ROOT/app-*.tar.gz 2>/dev/null | head -1)
           
            if [ -z "$LATEST_TAR" ]; then
              echo "❌ No tarball found"
              exit 1
            fi
           
            echo "🧹 Cleaning old files..."
            rm -rf "$APP_ROOT"/*
            
            echo "📦 Extracting $LATEST_TAR"
            tar -xzf "$LATEST_TAR" -C "$APP_ROOT"

            cd "$APP_ROOT"

            echo "📦 Installing dependencies..."
            npm install --omit=dev --no-audit --no-fund

            echo "🚀 Starting STAGING app..."
            PORT=3001 pm2 restart staging-app || PORT=3001 pm2 start index.js --name staging-app


  # ------------------ DEPLOY PRODUCTION ------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    environment:
      name: production   # ⛔ manual approval required

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Copy artifact to PRODUCTION server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.tar.gz"
          target: "/home/${{ secrets.SSH_USERNAME }}/app/"

      - name: Deploy with Atomic Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20 --silent

            APP_ROOT="/home/${{ secrets.SSH_USERNAME }}/app"
            RELEASES_DIR="$APP_ROOT/releases"
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE_PATH="$RELEASES_DIR/$TIMESTAMP"
            CURRENT_SYMLINK="$APP_ROOT/current"

            echo "🚀 Starting Deployment: $TIMESTAMP"
            mkdir -p "$RELEASES_DIR"
            mkdir -p "$NEW_RELEASE_PATH"

            PREVIOUS_RELEASE=$(readlink -f "$CURRENT_SYMLINK" || echo "")

            LATEST_TAR=$(ls -t $APP_ROOT/app-*.tar.gz 2>/dev/null | head -1)

            if [ -z "$LATEST_TAR" ]; then
                echo "❌ No tarball found"
                exit 1
            fi

            tar -xzf "$LATEST_TAR" -C "$NEW_RELEASE_PATH"
            cd "$NEW_RELEASE_PATH"
            npm install --omit=dev --no-audit --no-fund

            ln -sfn "$NEW_RELEASE_PATH" "$CURRENT_SYMLINK"

            pm2 restart my-node-app || pm2 start "$CURRENT_SYMLINK/index.js" --name my-node-app

            INITIAL_RESTARTS=$(pm2 jlist | node -e "
              const data = JSON.parse(require('fs').readFileSync(0));
              const app = data.find(a => a.name === 'my-node-app');
              process.stdout.write(app ? app.pm2_env.restart_time.toString() : '0');
            ")

            sleep 15

            NEW_RESTARTS=$(pm2 jlist | node -e "
              const data = JSON.parse(require('fs').readFileSync(0));
              const app = data.find(a => a.name === 'my-node-app');
              process.stdout.write(app ? app.pm2_env.restart_time.toString() : '0');
            ")

            RESTART_DIFF=$((NEW_RESTARTS - INITIAL_RESTARTS))

            if [ "$RESTART_DIFF" -eq 0 ]; then
                echo "✅ DEPLOYMENT SUCCESSFUL"
            else
                echo "🚨 CRASH DETECTED - ROLLBACK"

                if [ -n "$PREVIOUS_RELEASE" ] && [ "$PREVIOUS_RELEASE" != "$NEW_RELEASE_PATH" ]; then
                    ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_SYMLINK"
                    pm2 restart my-node-app
                    echo "✅ ROLLBACK COMPLETE"
                else
                    pm2 stop my-node-app || true
                fi
                exit 1
            fi


  # ------------------ NOTIFY ------------------
  notify:
    needs: [lint, test, build, deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions CI/CD

          subject: >
            ${{ 
              needs.deploy-production.result == 'success' && '✅ SUCCESS' || 
              needs.deploy-production.result == 'failure' && '🚨 FAILED (Rollback)' || 
              '⚠️ CANCELLED' 
            }}: Deployment for ${{ github.repository }}

          body: |
            Deployment Summary:

            Status: ${{ needs.deploy-production.result }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Lint: ${{ needs.lint.result }}
            Test: ${{ needs.test.result }}
            Build: ${{ needs.build.result }}
            Staging: ${{ needs.deploy-staging.result }}
            Production: ${{ needs.deploy-production.result }}

            Pipeline:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
